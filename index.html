<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./logic.js" defer></script>
    <link rel="shortcut icon" href="./checklist.png" type="image/png" />
  </head>
  <body>
    <div class="add">
      <form>
        <label for="event"> Task name: </label>
        <input type="text" id="event" placeholder="Add Task here..." />
        <button type="submit">Add</button>
      </form>
    </div>
    <div class="list" id="list">
      <div class="task" id="-1">
        <h4>Task</h4>
        <div class="btn-cls">
          <button class="edit" data-edit="-1">&#9998;</button>
          <button class="del" data-del="-1">&#128465;</button>
        </div>
      </div>
    </div>
  </body>
</html>
